<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amadeo — Pedidos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');
:root{
  --bg:#f0ebe0;--paper:#fdfaf4;--ink:#1a1612;--ink2:#3d3830;
  --muted:#8a8070;--rule:#d4ccbb;--accent:#c0392b;--green:#1e6b3c;
  --blue:#1a4a7a;--orange:#e67e22;--purple:#6c3483;--gold:#b8860b;--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:80px;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000;}
.login-card{background:var(--paper);border-radius:14px;padding:30px 22px;width:100%;max-width:340px;}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;letter-spacing:2px;margin-bottom:4px;}
.login-sub{font-size:.82rem;color:var(--muted);margin-bottom:22px;}
.role-row{display:flex;gap:8px;margin-bottom:18px;}
.role-btn{flex:1;background:#fff;border:2px solid var(--rule);border-radius:var(--r);cursor:pointer;padding:12px 6px;text-align:center;transition:all .2s;}
.role-btn .ri{font-size:1.6rem;margin-bottom:3px;}
.role-btn .rl{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.role-btn.sel-admin{border-color:var(--blue);background:#eef4ff;}
.role-btn.sel-rep{border-color:var(--green);background:#eef8ee;}
.login-input{background:#fff;border:1.5px solid var(--rule);border-radius:6px;color:var(--ink);font-family:'Barlow',sans-serif;font-size:1rem;padding:11px 13px;outline:none;width:100%;margin-bottom:10px;transition:border .15s;}
.login-input:focus{border-color:var(--blue);}
.login-err{background:#fdecea;border:1px solid #f0b0a8;border-radius:6px;color:var(--accent);font-size:.8rem;padding:7px 10px;margin-bottom:8px;display:none;}
.login-err.show{display:block;}
.login-btn{border:none;border-radius:7px;color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:1.5px;padding:13px;text-transform:uppercase;width:100%;}
.login-btn.admin{background:var(--blue);}
.login-btn.rep{background:var(--green);}

/* APP SHELL */
#appShell{display:none;}
.app-bar{background:var(--ink);position:sticky;top:0;z-index:200;}
.ab-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;}
.ab-top h1{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:1px;color:#fff;}
.ab-right{display:flex;align-items:center;gap:7px;}
.role-badge{border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.5px;padding:3px 8px;text-transform:uppercase;}
.role-badge.admin{background:rgba(26,74,122,.6);color:#adf;}
.role-badge.rep{background:rgba(30,107,60,.6);color:#afa;}
.btn-logout{background:none;border:1px solid rgba(255,255,255,.2);border-radius:4px;color:#aaa;cursor:pointer;font-size:.7rem;padding:3px 8px;}
.btn-logout:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

/* DIA SELECTOR */
.dia-bar{display:flex;gap:4px;flex-wrap:wrap;padding:0 14px 8px;}
.dia-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:5px;color:#999;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.71rem;font-weight:700;padding:5px 9px;text-transform:uppercase;transition:all .15s;}
.dia-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* TABS */
.tabs{display:flex;background:#0d0a08;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:3px solid transparent;color:#555;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.73rem;font-weight:700;letter-spacing:.8px;padding:10px 11px;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.tab-btn.on{color:#fff;border-bottom-color:var(--accent);background:#1e1810;}
.tab-btn.on.verde{border-bottom-color:#4caf50;background:#142014;}

/* VIEWS */
.view{display:none;padding:13px;}
.view.on{display:block;}

/* CARDS */
.card{background:var(--paper);border:1px solid var(--rule);border-radius:var(--r);padding:13px;margin-bottom:11px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}

/* INPUTS */
input,textarea,select{background:#fff;border:1.5px solid var(--rule);border-radius:5px;color:var(--ink);font-family:'Barlow',sans-serif;font-size:.92rem;padding:8px 10px;outline:none;transition:border .15s;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--blue);}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--blue);}
textarea{resize:none;}

/* BUSCADORES */
.sw{position:relative;margin-bottom:9px;}
.ac{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--blue);border-top:none;border-radius:0 0 7px 7px;max-height:230px;overflow-y:auto;z-index:60;box-shadow:0 6px 18px rgba(0,0,0,.13);display:none;}
.ac-item{cursor:pointer;padding:10px 12px;border-bottom:1px solid var(--rule);transition:background .1s;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover{background:#eef4ff;}
.ac-r1{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;}
.b-num{background:var(--blue);color:#fff;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:800;padding:2px 6px;}
.b-zona{background:var(--ink);color:#fff;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:.67rem;font-weight:700;padding:1px 5px;}
.ac-nombre{font-weight:600;font-size:.88rem;}
.ac-sub{color:var(--muted);font-size:.72rem;}

/* CLIENTE SELECCIONADO */
.cli-sel{background:#eef4ff;border:1.5px solid var(--blue);border-radius:var(--r);padding:9px 12px;margin-bottom:9px;display:none;align-items:center;justify-content:space-between;gap:8px;}
.cs-l{display:flex;align-items:center;gap:8px;}
.cs-num{background:var(--blue);color:#fff;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;padding:3px 8px;}
.cs-nombre{font-weight:700;font-size:.9rem;}
.cs-dir{color:var(--muted);font-size:.72rem;margin-top:1px;}
.cs-tel{color:var(--blue);font-size:.71rem;}
.btn-cambiar{background:none;border:1px solid var(--rule);border-radius:4px;color:var(--muted);cursor:pointer;font-size:.7rem;padding:3px 7px;}

/* ITEMS PEDIDO */
.ped-items{display:flex;flex-direction:column;gap:6px;margin-bottom:9px;}
.ped-item{background:#fff;border:1.5px solid var(--rule);border-radius:7px;display:flex;align-items:center;gap:8px;padding:8px 10px;}
.pi-n{flex:1;font-weight:600;font-size:.86rem;}
.pi-qw{display:flex;align-items:center;gap:5px;}
.pi-qw button{background:var(--rule);border:none;border-radius:4px;color:var(--ink);cursor:pointer;font-size:.95rem;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.pi-qw button:hover{background:var(--blue);color:#fff;}
.pi-q{background:none;border:none;color:var(--blue);font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;text-align:center;width:32px;padding:0;outline:none;}
.pi-sub{font-family:'Barlow Condensed',sans-serif;font-size:.97rem;font-weight:700;color:var(--green);min-width:68px;text-align:right;}
.pi-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:1rem;padding:0 2px;}
.pi-del:hover{color:var(--accent);}
.ped-vacio{color:var(--muted);font-size:.82rem;text-align:center;padding:14px;border:1.5px dashed var(--rule);border-radius:6px;}

/* TOTAL */
.total-bar{display:flex;align-items:center;justify-content:space-between;background:var(--ink);border-radius:6px;padding:10px 14px;margin:9px 0;}
.tb-lbl{color:#aaa;font-size:.74rem;letter-spacing:1px;text-transform:uppercase;}
.tb-val{font-family:'Barlow Condensed',sans-serif;font-size:1.45rem;font-weight:700;color:#fff;}

/* PROMO */
.promo-av{background:#fff5c0;border:1px solid var(--gold);border-radius:5px;padding:5px 9px;font-size:.73rem;color:#7a5000;margin-bottom:7px;display:none;}
.promo-av.on{display:block;}

/* OBS */
.obs-row{margin-bottom:9px;}
.obs-row textarea{height:34px;font-size:.82rem;}

/* BOTONES PRINCIPALES */
.btn-add{background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1.5px;padding:11px;text-transform:uppercase;width:100%;}
.btn-sm{background:var(--ink);border:none;border-radius:5px;color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.87rem;font-weight:700;letter-spacing:1px;padding:9px;width:100%;}
.btn-save{background:var(--green);border:none;border-radius:5px;color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;padding:8px;flex:1;}
.btn-cancel{background:none;border:1px solid var(--rule);border-radius:5px;color:var(--muted);cursor:pointer;font-size:.81rem;padding:8px;flex:1;}
.btn-enviar{background:var(--blue);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1.5px;padding:13px;text-transform:uppercase;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;}

/* PARADA */
.parada{background:var(--paper);border:1px solid var(--rule);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.par-top{display:flex;align-items:stretch;border-bottom:1px solid var(--rule);}
.par-num{background:var(--ink);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;min-width:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.par-info{flex:1;padding:7px 10px;min-width:0;}
.par-cliente{font-family:'Barlow Condensed',sans-serif;font-size:.97rem;font-weight:800;}
.par-dir{font-size:.71rem;color:var(--muted);margin-top:1px;}
.par-tel{font-size:.7rem;color:var(--blue);margin-top:1px;}
.p-zona{background:var(--ink);color:#fff;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;padding:1px 5px;margin-left:5px;}
.par-cob{background:var(--green);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 9px;min-width:78px;text-align:center;flex-shrink:0;}
.par-cob .lbl{font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:1px;}
.par-cob .val{font-family:'Barlow Condensed',sans-serif;font-size:.97rem;font-weight:800;line-height:1.1;}
.par-cob.nc{background:var(--muted);}
.par-body{padding:7px 10px;display:flex;flex-wrap:wrap;gap:4px;}
.ptag{background:#eef0f5;border:1px solid #d0d4e0;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;padding:2px 7px;}
.ptag .pq{color:var(--blue);margin-right:2px;}
.ptag.pr{background:#fff5c0;border-color:var(--gold);}
.par-obs{padding:4px 10px 7px;font-size:.71rem;color:var(--orange);font-style:italic;border-top:1px dashed var(--rule);}
.par-act{display:flex;border-top:1px solid var(--rule);}
.par-act button{flex:1;background:none;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:.7rem;padding:7px;color:var(--muted);border-right:1px solid var(--rule);}
.par-act button:last-child{border-right:none;}
.par-act button:hover{background:#f0ece0;color:var(--ink);}
.par-act button:disabled{opacity:.3;cursor:default;}
.btn-turno-par{background:#fff;border:1.5px solid var(--rule);border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;transition:all .15s;color:var(--ink2);}
.btn-turno-par:hover{background:#f0f0f0;}
.btn-turno-par.man{background:#1a4a7a;border-color:#1a4a7a;color:#fff;}
.btn-turno-par.tar{background:#c0392b;border-color:#c0392b;color:#fff;}
.par-act button.del:hover{background:#fdecea;color:var(--accent);}

/* STOCK */
.res-box{background:var(--paper);border:2px solid var(--ink);border-radius:var(--r);overflow:hidden;margin-bottom:11px;}
.res-hdr{background:var(--ink);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:2px;padding:7px 12px;text-transform:uppercase;}
.res-hdr.purp{background:var(--purple);}
.res-hdr.gold{background:var(--gold);}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
.si{border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;padding:9px 11px;}
.si:nth-child(even){background:#f8f5ee;}
.si-n{font-size:.78rem;color:var(--ink2);}
.si-q{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;}
.res-total{border-top:2px solid var(--ink);display:flex;align-items:center;justify-content:space-between;padding:11px 13px;}
.rt-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.rt-val{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:800;color:var(--green);}

/* SUB-TABS */
.sub-tabs{display:flex;background:#e8e0d4;border-radius:8px;padding:3px;margin-bottom:12px;gap:3px;}
.sub-tab{flex:1;background:none;border:none;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.5px;padding:8px 4px;text-align:center;text-transform:uppercase;color:var(--muted);}
.sub-tab.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.sub-tab .cnt{background:var(--accent);border-radius:10px;color:#fff;font-size:.62rem;font-weight:800;margin-left:4px;padding:1px 5px;}
.sub-tab.on .cnt{background:var(--green);}
.sub-view{display:none;}
.sub-view.on{display:block;}

/* PROGRESS */
.prog-bar-wrap{background:#d4ccbb;border-radius:10px;height:6px;margin-bottom:12px;overflow:hidden;}
.prog-bar{background:var(--green);height:100%;border-radius:10px;transition:width .4s;}

.dia-btn-rep{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:5px;color:#888;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.5px;padding:6px 10px;text-transform:uppercase;transition:all .15s;flex-shrink:0;}
.dia-btn-rep:hover{background:rgba(255,255,255,.15);color:#fff;}
.dia-btn-rep.on{background:var(--green);border-color:var(--green);color:#fff;}

/* REPARTIDOR PARADA */
.rep-par{background:var(--paper);border:1px solid #b0d4b0;border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.rp-top{display:flex;align-items:stretch;border-bottom:1px solid #b0d4b0;}
.rp-num{background:var(--ink);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;min-width:36px;display:flex;align-items:center;justify-content:center;}
.rp-info{flex:1;padding:8px 10px;}
.rp-cliente{font-family:'Barlow Condensed',sans-serif;font-size:.97rem;font-weight:800;}
.rp-dir{font-size:.71rem;color:var(--muted);margin-top:1px;}
.rp-tel{font-size:.7rem;color:var(--blue);margin-top:1px;}
.rp-cob{background:var(--green);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 9px;min-width:78px;text-align:center;flex-shrink:0;}
.rp-cob .lbl{font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;margin-bottom:1px;}
.rp-cob .val{font-family:'Barlow Condensed',sans-serif;font-size:.97rem;font-weight:800;line-height:1.1;}
.rp-items{padding:7px 10px;display:flex;flex-wrap:wrap;gap:4px;border-bottom:1px solid #b0d4b0;}
.rp-obs{padding:4px 10px;font-size:.71rem;color:var(--orange);font-style:italic;border-bottom:1px solid #b0d4b0;}

/* MOD PANEL */
.mod-panel{background:#f0f8f0;border-bottom:1px solid #b0d4b0;padding:10px 11px;display:none;}
.mod-panel.on{display:block;}
.mod-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.mod-items{display:flex;flex-direction:column;gap:5px;margin-bottom:7px;}
.mod-item{background:#fff;border:1.5px solid var(--rule);border-radius:6px;display:flex;align-items:center;gap:7px;padding:6px 9px;}
.mod-in{flex:1;font-size:.84rem;font-weight:600;}
.mod-qw{display:flex;align-items:center;gap:4px;}
.mod-qw button{background:var(--rule);border:none;border-radius:3px;color:var(--ink);cursor:pointer;font-size:.9rem;font-weight:700;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.mod-qw button:hover{background:var(--green);color:#fff;}
.mod-q{background:none;border:none;color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;text-align:center;width:28px;padding:0;outline:none;}
.mod-s{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;color:var(--green);min-width:58px;text-align:right;}
.mod-sw{position:relative;margin-bottom:7px;}
.mod-sw input{background:#fff;border:1.5px solid var(--rule);border-radius:5px;color:var(--ink);font-family:'Barlow',sans-serif;font-size:.88rem;padding:7px 10px;width:100%;}
.mod-ac{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--green);border-top:none;border-radius:0 0 6px 6px;max-height:180px;overflow-y:auto;z-index:60;box-shadow:0 4px 12px rgba(0,0,0,.12);display:none;}
.mod-ac-item{cursor:pointer;padding:8px 11px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;font-size:.84rem;font-weight:600;}
.mod-ac-item:hover{background:#e8f5e8;}
.mod-total{display:flex;align-items:center;justify-content:space-between;background:var(--ink);border-radius:5px;padding:7px 11px;margin-bottom:7px;}
.mod-total .lbl{color:#aaa;font-size:.72rem;text-transform:uppercase;}
.mod-total .val{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;color:#fff;}
.btn-aplicar{background:var(--green);border:none;border-radius:5px;color:#fff;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:1px;padding:9px;text-transform:uppercase;width:100%;}

/* COBRO PANEL */
.cob-panel{background:#eaf4ea;border-bottom:1px solid #b0d4b0;padding:10px 11px;}
.cob-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.modo-btns{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.modo-btn{border:2px solid var(--rule);border-radius:7px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;padding:8px 11px;background:#fff;color:var(--ink2);}
.modo-btn.efe{background:#1a5c1a;border-color:#1a5c1a;color:#fff;}
.modo-btn.tra{background:#1a3a7a;border-color:#1a3a7a;color:#fff;}
.modo-btn.mix{background:#5a3a00;border-color:#5a3a00;color:#fff;}
.monto-row{display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.monto-f{flex:1;min-width:120px;}
.monto-f label{font-size:.67rem;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:3px;}
.monto-f input{padding:7px 9px;}
.obs-cob{margin-bottom:8px;}
.obs-cob label{font-size:.67rem;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:3px;}
.obs-cob textarea{height:34px;font-size:.82rem;}
.rp-act{display:flex;border-top:1px solid #b0d4b0;}
.rp-act button{flex:1;background:none;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:.71rem;padding:8px 4px;color:var(--muted);border-right:1px solid #b0d4b0;}
.rp-act button:last-child{border-right:none;}
.rp-act button:hover{background:#f0f8f0;color:var(--ink);}
.rp-act button.entregar{background:var(--green);color:#fff;font-weight:600;}
.rp-act button.entregar:hover{background:#155c30;}

    <button class="login-btn admin" id="loginBtn" onclick="doLogin()">INGRESAR</button>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="app-bar">
    <div class="ab-top">
      <h1 id="appTitle">📦 Amadeo <span class="dot"></span></h1>
      <div class="ab-right">
        <span class="role-badge" id="roleBadge"></span>
        <button class="btn-logout" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <!-- Selector de día (solo admin) -->
    <div class="dia-bar" id="diaBar" style="display:none;">
      <button class="dia-btn" data-d="lunes"     onclick="selDia('lunes')">LUN</button>
      <button class="dia-btn" data-d="martes"    onclick="selDia('martes')">MAR</button>
      <button class="dia-btn" data-d="miercoles" onclick="selDia('miercoles')">MIÉ</button>
      <button class="dia-btn" data-d="jueves"    onclick="selDia('jueves')">JUE</button>
      <button class="dia-btn" data-d="viernes"   onclick="selDia('viernes')">VIE</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, remove, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── FIREBASE CONFIG ──────────────────────────
const fbConfig = {
  apiKey: "AIzaSyBdT0K-ejv1_lKMqTyh0gO0tRbIT_3oNU8",
  authDomain: "amadeo-pedidos.firebaseapp.com",
  databaseURL: "https://amadeo-pedidos-default-rtdb.firebaseio.com",
  projectId: "amadeo-pedidos",
  storageBucket: "amadeo-pedidos.firebasestorage.app",
  messagingSenderId: "388957123752",
  appId: "1:388957123752:web:507ed6cc921f7635f1fe9d"
};
const fbApp = initializeApp(fbConfig);
const db    = getDatabase(fbApp);

// ── CONTRASEÑAS ──────────────────────────────
const PASS = { admin: "admin2025", rep: "rep2025" };

// ── RUTAS FIREBASE ───────────────────────────
const FB = {
  clientes:  "clientes",
  catalogo:  "catalogo",
  pedidos:   "pedidos",
  repEstado: "rep_estado",
  prosp:     "prosp",
  facturados:"facturados",
  ventas:    "ventas_prosp",
  turnos:    "turnos"
};

// ── CONSTANTES ───────────────────────────────
const DIAS = ["lunes","martes","miercoles","jueves","viernes","sabado"];
const DIAS_L = {lunes:"Lunes",martes:"Martes",miercoles:"Miércoles",jueves:"Jueves",viernes:"Viernes",sabado:"Sábado"};
const DIAS_S = {lunes:"LUN",martes:"MAR",miercoles:"MIÉ",jueves:"JUE",viernes:"VIE",sabado:"SÁB"};

// ── ESTADO GLOBAL ────────────────────────────
let rol        = "";
let diaActual  = "";
let catalogo   = [];
let clientes   = [];
let pedidos    = {};   // { fbKey: pedido }
let repEstado  = {};   // { fbKey: estado }
let prosp      = {};
let facturados = {};
let ventas     = {};

// Estado formulario
let cliActual   = null;
let itemsPedido = [];
let editKey     = null;
let itemsProsp  = [];
let itemsVenta  = [];
let ventaModo   = "";
let ventasLocal = JSON.parse(localStorage.getItem("am_ventas")||"[]");
let reglasTemp  = [];
let ordenManual = [];

// ── LOGIN ─────────────────────────────────────
window.selRol = (r) => {
  document.getElementById("rb-admin").className = "role-btn"+(r==="admin"?" sel-admin":"");
  document.getElementById("rb-rep").className   = "role-btn"+(r==="rep"?" sel-rep":"");
  document.getElementById("loginBtn").className = "login-btn "+(r==="admin"?"admin":"rep");
  document.getElementById("loginPass").value = "";
};
let rolSel = "admin";
document.getElementById("rb-admin").addEventListener("click", ()=>{ rolSel="admin"; });
document.getElementById("rb-rep").addEventListener("click",   ()=>{ rolSel="rep";   });

window.doLogin = async () => {
  const pass = document.getElementById("loginPass").value;
  const err  = document.getElementById("loginErr");
  if (pass !== PASS[rolSel]) { err.classList.add("show"); return; }
  err.classList.remove("show");
  rol = rolSel;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appShell").style.display    = "block";
  await iniciarApp();
};

window.doLogout = () => {
  rol = ""; diaActual = ""; cliActual = null;
  itemsPedido = []; editKey = null; ordenManual = [];
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("appShell").style.display    = "none";
  document.getElementById("loginPass").value = "";
};

// ── INICIAR APP ───────────────────────────────
async function iniciarApp() {
  // Cargar datos estáticos
  await cargarCatalogo();
  await cargarClientes();
  await cargarTurnos();

  // Escuchar datos en tiempo real
  escucharPedidos();
  escucharRepEstado();
  escucharProsp();
  escucharVentasAdmin();
  escucharFacturados();
  escucharVentas();

  if (rol === "admin") {
    document.getElementById("appTitle").innerHTML = '📦 Amadeo — Admin <span class="dot"></span>';
    document.getElementById("roleBadge").textContent = "Administrativo";
    document.getElementById("roleBadge").className = "role-badge admin";
    document.getElementById("diaBar").style.display = "flex";
    buildAdminUI();
    const d = localStorage.getItem("am_dia")||"";
    if (d) selDia(d);
    else   document.getElementById("aviso-dia")?.classList.add("on");
  } else {
    document.getElementById("appTitle").innerHTML = '🚚 Amadeo — Repartidor <span class="dot"></span>';
    document.getElementById("roleBadge").textContent = "Repartidor";
    document.getElementById("roleBadge").className = "role-badge rep";
    document.getElementById("diaBar").style.display = "none";
    buildRepUI();
    // Restaurar día del repartidor si ya eligió uno antes
    if (diaRep) {
      document.querySelectorAll(".dia-btn-rep").forEach(b =>
        b.classList.toggle("on", b.id === "dr-"+diaRep)
      );
    }
  }
}

// ── FIREBASE: CATÁLOGO ────────────────────────
async function cargarCatalogo() {
  const snap = await get(ref(db, FB.catalogo));
  if (snap.exists()) {
    const data = snap.val();
    catalogo = Object.values(data).filter(Boolean);
  } else {
    catalogo = catDefault();
    const obj = {};
    catalogo.forEach(p => obj[p.id] = p);
    await set(ref(db, FB.catalogo), obj);
  }
}

async function saveCatalogo() {
  const obj = {};
  catalogo.forEach(p => obj[p.id] = p);
  await set(ref(db, FB.catalogo), obj);
}

// ── FIREBASE: CLIENTES ────────────────────────
async function cargarClientes() {
  const snap = await get(ref(db, FB.clientes));
  clientes = snap.exists() ? Object.values(snap.val()).filter(Boolean) : [];
  // Normalizar clientes migrados: si no tienen ordenLMV, usar orden como base
  clientes.forEach(c => {
    if (!c.ordenLMV && c.orden) c.ordenLMV = c.orden;
  });
}

async function saveClientes() {
  const obj = {};
  clientes.forEach(c => obj[c.id] = c);
  await set(ref(db, FB.clientes), obj);
}

// ── FIREBASE: PEDIDOS (tiempo real) ───────────
function escucharPedidos() {
  onValue(ref(db, FB.pedidos), snap => {
    pedidos = snap.exists() ? snap.val() : {};
    if (rol === "admin") {
      renderRuta();
      renderStock();
      // Actualizar clientes con colores si está visible
      if (document.getElementById("v-clientes")?.classList.contains("on")) renderClientes();
      // Solo actualizar seguimiento si está visible
      if (document.getElementById("v-seguimiento")?.classList.contains("on")) renderSeguimiento();
    }
    if (rol === "rep") { renderRepRecorrido(); }
  });
}

async function pushPedido(p) {
  if (editKey) {
    await set(ref(db, FB.pedidos+"/"+editKey), p);
    editKey = null;
  } else {
    await push(ref(db, FB.pedidos), p);
  }
}

async function removePedido(k) { await remove(ref(db, FB.pedidos+"/"+k)); }

// ── FIREBASE: REP ESTADO (tiempo real) ────────
function escucharVentasAdmin() {
  onValue(ref(db, FB.ventas), snap => {
    ventas = snap.exists() ? snap.val() : {};
    if (rol === "admin" && document.getElementById("v-stock")?.classList.contains("on")) {
      renderCobrosAdmin();
    }
  });
}

function escucharRepEstado() {
  onValue(ref(db, FB.repEstado), snap => {
    const nuevoEstado = snap.exists() ? snap.val() : {};

    if (rol === "admin") {
      // SIEMPRE actualizar repEstado en el admin para que el seguimiento funcione
      repEstado = nuevoEstado;
      // Re-renderizar seguimiento si está visible
      if (document.getElementById("v-seguimiento")?.classList.contains("on")) {
        renderSeguimiento();
      }
      // También actualizar stock sobrante si está visible
      if (document.getElementById("v-stock")?.classList.contains("on")) {
        renderStock();
      }
    }

    if (rol === "rep") {
      const panelAbierto = Object.keys(_modCache).length > 0 ||
        document.querySelector(".mod-panel.on") !== null;

      if (panelAbierto) {
        // Con paneles abiertos — actualizar solo pedidos que no estén en edición
        Object.entries(nuevoEstado).forEach(([k, est]) => {
          if (_modCache[k]) return;
          const panel = document.getElementById("rmod-"+k);
          if (panel?.classList.contains("on")) return;
          repEstado[k] = est;
        });
        renderRepEntregados(
          Object.entries(pedidos)
            .filter(([,p])=>!diaRep||p.dia===diaRep)
            .map(([k,p])=>({...p,_k:k}))
            .filter(p=>(repEstado[p._k]||{}).entregado)
        );
      } else {
        repEstado = nuevoEstado;
        renderRepRecorrido();
      }
    }
  });
}

// Timer de debounce para no guardar en Firebase en cada tecla
const _repSaveTimers = {};
async function saveRepEst(k, est, debounce=false) {
  // Siempre guardar en memoria local inmediatamente
  repEstado[k] = est;
  if (debounce) {
    // Esperar 1.5s sin actividad antes de guardar en Firebase
    clearTimeout(_repSaveTimers[k]);
    _repSaveTimers[k] = setTimeout(async () => {
      await set(ref(db, FB.repEstado+"/"+k), est);
    }, 1500);
  } else {
    await set(ref(db, FB.repEstado+"/"+k), est);
  }
}

// ── FIREBASE: PROSP ───────────────────────────
function escucharProsp() {
  onValue(ref(db, FB.prosp), snap => {
    prosp = snap.exists() ? snap.val() : {};

    if (rol === "admin") {
      // Repoblar itemsProsp desde Firebase con los datos del día actual
      const key = diaActual || Object.keys(prosp)[0] || "";
      if (key && prosp[key]) {
        itemsProsp = Object.entries(prosp[key]).map(([prodId, v]) => ({
          prodId: parseInt(prodId),
          nombre: v.nombre,
          qty: v.qty
        }));
        renderProspItems();
        // Mostrar resumen guardado
        const resBox = document.getElementById("prospResBox");
        const resGrid = document.getElementById("prospResGrid");
        if (resBox && resGrid && itemsProsp.length) {
          resGrid.innerHTML = "";
          itemsProsp.forEach(i => {
            const d = document.createElement("div"); d.className = "si";
            d.innerHTML = `<span class="si-n">${i.nombre}</span><span class="si-q">${i.qty}</span>`;
            resGrid.appendChild(d);
          });
          resBox.style.display = "block";
        }
      }
      // Actualizar stock si está visible
      if (document.getElementById("v-stock")?.classList.contains("on")) renderStock();
    }

    if (rol === "rep") renderRepStock();
  });
}

// ── FIREBASE: FACTURADOS ──────────────────────
function escucharFacturados() {
  onValue(ref(db, FB.facturados), snap => {
    facturados = snap.exists() ? snap.val() : {};
    if (rol === "admin") renderSeguimiento();
    if (rol === "rep")   renderRepEntregados();
  });
}

// ── FIREBASE: VENTAS ──────────────────────────
function escucharVentas() {
  onValue(ref(db, FB.ventas), snap => {
    ventas = snap.exists() ? snap.val() : {};
    if (rol === "admin") renderAdminVentas();
  });
}

// ── SELECTOR DE DÍA ───────────────────────────
window.selDia = (d) => {
  diaActual = d;
  ordenManual = [];
  localStorage.setItem("am_dia", d);
  document.querySelectorAll(".dia-btn").forEach(b => b.classList.toggle("on", b.dataset.d===d));
  document.getElementById("aviso-dia")?.classList.remove("on");
  renderRuta();
  renderStock();
  if (getView("seguimiento")?.classList.contains("on")) renderSeguimiento();

  // Recargar prospección del nuevo día
  const pDia = prosp[d] || {};
  itemsProsp = Object.entries(pDia).map(([prodId, v]) => ({
    prodId: parseInt(prodId), nombre: v.nombre, qty: v.qty
  }));
  renderProspItems();
  // Mostrar resumen si hay datos
  const resBox = document.getElementById("prospResBox");
  const resGrid = document.getElementById("prospResGrid");
  if (resBox && resGrid) {
    if (itemsProsp.length) {
      resGrid.innerHTML = "";
      itemsProsp.forEach(i => {
        const d2 = document.createElement("div"); d2.className = "si";
        d2.innerHTML = `<span class="si-n">${i.nombre}</span><span class="si-q">${i.qty}</span>`;
        resGrid.appendChild(d2);
      });
      resBox.style.display = "block";
    } else {
      resBox.style.display = "none";
    }
  }
};

// ── HELPER: orden por día ─────────────────────
function ordenCliente(c, dia) {
  // Clientes migrados solo tienen "orden" — usarlo como fallback en todos los grupos
  if (!dia) return c.ordenLMV || c.orden || 999;
  if (dia==="lunes"||dia==="miercoles"||dia==="viernes") return c.ordenLMV || c.orden || 999;
  if (dia==="martes"||dia==="jueves")  return c.ordenMJ  || c.ordenLMV || c.orden || 999;
  if (dia==="sabado")                  return c.ordenSAB || c.ordenLMV || c.orden || 999;
  return c.ordenLMV || c.orden || 999;
}

function ordenPedido(p) {
  const c = clientes.find(x => x.id === p.clienteId);
  return c ? ordenCliente(c, diaActual) : (p.orden || 999);
}

window.buscarCli = (v) => {
  const ac = document.getElementById("sAc");
  if (!v.trim()) { ac.style.display="none"; return; }
  const q = v.toLowerCase();
  const dia = diaActual;
  let found = [...clientes].sort((a,b)=>ordenCliente(a,dia)-ordenCliente(b,dia))
    .filter(c =>
      c.nombre.toLowerCase().includes(q) ||
      (c.tel||"").includes(q) ||
      (c.zona||"").toLowerCase().includes(q)
    );
  // Filtrar por día si hay uno seleccionado
  if (dia) found = found.filter(c => Array.isArray(c.dias) && c.dias.includes(dia));
  if (!found.length) { ac.style.display="none"; return; }
  ac.innerHTML = found.map(c => {
    const num = ordenCliente(c, dia);
    return `<div class="ac-item" onclick="selCli(${c.id})">
      <div class="ac-r1">
        <span class="b-num">#${num}</span>
        ${c.zona?`<span class="b-zona">${c.zona}</span>`:""}

      </div>
      <div class="ac-sub">📍 ${c.dir||"—"}${c.tel?" · 📱 "+c.tel:""}</div>
    </div>`;
  }).join("");
  ac.style.display = "block";
};

window.addItemPedido = (prodId) => {
  const ex = itemsPedido.find(i=>i.prodId===prodId);
  if (ex) { ex.qty++; }
  else {
    const p = catalogo.find(x=>x.id===prodId);
    if (!p) return;
    itemsPedido.push({prodId, nombre:p.nombre, qty:1, tipo:p.tipo, reglas:p.reglas||[], precioBase:p.precio});
  }
  document.getElementById("pSearch").value = "";
  document.getElementById("pAc").style.display = "none";
  renderItemsPedido();
};

function renderItemsPedido() {
  const cont = document.getElementById("pedItems");
  if (!itemsPedido.length) {
    cont.innerHTML = '<div class="ped-vacio">Buscá un producto arriba.</div>';
    document.getElementById("pedTotal").textContent = "$ 0";
    document.getElementById("promoAv").classList.remove("on");
    return;
  }
  cont.innerHTML = "";
  const msgs = []; let total = 0;
  itemsPedido.forEach((item, idx) => {
    let pu = item.precioBase, esP = false;
    if (item.tipo==="promo" && item.reglas?.length) {
      const r = [...item.reglas].filter(r=>item.qty>=r.desde).sort((a,b)=>b.desde-a.desde)[0];
      if (r) { pu=r.precioUnit; esP=true; msgs.push(`★ ${item.nombre} ×${item.qty} → $${(pu*item.qty).toLocaleString("es-AR")}`); }
    }
    const sub = item.qty * pu; total += sub;
    const row = document.createElement("div"); row.className = "ped-item";
    row.innerHTML = `
      <div class="pi-n">${item.nombre}${esP?' <span style="background:var(--gold);color:#fff;border-radius:3px;font-size:.6rem;font-weight:700;padding:1px 4px;">★</span>':""}</div>
      <div class="pi-qw">
        <button onclick="chgItem(${idx},-1)">−</button>
        <input class="pi-q" type="number" min="1" value="${item.qty}" oninput="setItem(${idx},this.value)" onfocus="this.select()"/>
        <button onclick="chgItem(${idx},1)">+</button>
      </div>
      <div class="pi-sub">$ ${sub.toLocaleString("es-AR")}</div>
      <button class="pi-del" onclick="quitarItem(${idx})">✕</button>`;
    cont.appendChild(row);
  });
  document.getElementById("pedTotal").textContent = "$ "+total.toLocaleString("es-AR");
  const av = document.getElementById("promoAv");
  if (msgs.length) { av.textContent=msgs.join(" | "); av.classList.add("on"); }
  else av.classList.remove("on");
}

window.chgItem  = (i,d) => { itemsPedido[i].qty=Math.max(1,itemsPedido[i].qty+d); renderItemsPedido(); };
window.setItem  = (i,v) => { itemsPedido[i].qty=Math.max(1,parseInt(v)||1); renderItemsPedido(); };
window.quitarItem = (i) => { itemsPedido.splice(i,1); renderItemsPedido(); };

function calcPrecioPromo(item) {
  let pu=item.precioBase, esP=false;
  if (item.tipo==="promo" && item.reglas?.length) {
    const r=[...item.reglas].filter(r=>item.qty>=r.desde).sort((a,b)=>b.desde-a.desde)[0];
    if(r){pu=r.precioUnit;esP=true;}
  }
  return {pu, esP};
}

// ── AGREGAR PEDIDO ────────────────────────────
window.agregarPedido = async () => {
  if (!diaActual) { alert("Seleccioná un día arriba."); return; }
  if (!cliActual) { alert("Seleccioná un cliente."); return; }
  if (!itemsPedido.length) { alert("Agregá al menos un producto."); return; }
  const obs = document.getElementById("pedObs").value.trim();
  const items = itemsPedido.slice(0,15).map(item => {
    const {pu,esP} = calcPrecioPromo(item);
    return {id:item.prodId, n:item.nombre, q:item.qty, precioUnit:pu, esPromo:esP, subtotal:item.qty*pu};
  });
  const total = items.reduce((a,i)=>a+i.subtotal, 0);
  const pedido = {
    clienteId: cliActual.id,
    cliente:   cliActual.nombre,
    dir:       cliActual.dir||"",
    tel:       cliActual.tel||"",
    zona:      cliActual.zona||"",
    dia:       diaActual,
    obs, items, total,
    ts: Date.now()
  };
  const btn = document.getElementById("btnAdd");
  btn.disabled = true;
  await pushPedido(pedido);
  resetForm();
  btn.textContent = "✓ GUARDADO"; btn.style.background="var(--green)";
  setTimeout(()=>{ btn.textContent="+ AGREGAR AL RECORRIDO"; btn.style.background=""; btn.disabled=false; }, 1400);
};

function resetForm() {
  cliActual=null; itemsPedido=[]; editKey=null;
  document.getElementById("pedObs").value = "";
  document.getElementById("sInput").value = "";
  document.getElementById("pSearch").value = "";
  document.getElementById("cliSel").style.display = "none";
  document.getElementById("pAc").style.display = "none";
  document.getElementById("sAc").style.display = "none";
  renderItemsPedido();
}

function renderRuta() {
  const titulo = document.getElementById("rutaTitulo");
  if (titulo) titulo.textContent = "Recorrido — "+(DIAS_L[diaActual]||"Sin día");

  // Filtrar pedidos del día activo
  let lista = Object.entries(pedidos)
    .filter(([,p]) => !diaActual || p.dia === diaActual)
    .map(([k,p]) => ({...p, _k:k}));

  // Aplicar filtro de turno
  lista = filtrarPorTurno(lista, turnoFiltroRuta);

  // Aplicar orden manual o calcular por grupo de días
  const keysA = lista.map(p=>p._k).sort().join(",");
  const keysM = [...ordenManual].sort().join(",");
  if (ordenManual.length && keysA === keysM) {
    const pos = {}; ordenManual.forEach((k,i)=>pos[k]=i);
    lista.sort((a,b)=>(pos[a._k]??999)-(pos[b._k]??999));
  } else {
    lista.sort((a,b)=>ordenPedido(a)-ordenPedido(b));
    ordenManual = lista.map(p=>p._k);
  }

  const countEl = document.getElementById("rutaCount");
  if (countEl) countEl.textContent = lista.length+" parada"+(lista.length!==1?"s":"");
  const cont = document.getElementById("listaParadas");
  if (!cont) return;

  if (!lista.length) {
    cont.innerHTML = `<div class="empty">No hay pedidos para ${DIAS_L[diaActual]||"este día"} todavía.</div>`;
    return;
  }

  cont.innerHTML = "";
  lista.forEach((p, pos) => {
    const div = document.createElement("div"); div.className="parada";
    const items = p.items.map(it =>
      `<span class="ptag${it.esPromo?" pr":""}"><span class="pq">${it.q}×</span>${it.n}</span>`
    ).join("");
    const cob = p.total>0
      ? `<div class="par-cob"><span class="lbl">Cobrar</span><span class="val">$${p.total.toLocaleString("es-AR")}</span></div>`
      : `<div class="par-cob nc"><span class="lbl">Sin monto</span></div>`;
    const esFirst = pos===0, esLast = pos===lista.length-1;
    // Usar data-atributos para evitar problemas de comillas en onclick
    div.dataset.key = p._k;
    // Turno del cliente
    const cliP = clientes.find(c=>c.id===p.clienteId);
    const zonaKeyP = (cliP?.zona||"").trim().toLowerCase();
    const turnoP = turnos[zonaKeyP]?.[p.dia]||"";

    div.innerHTML =
      '<div class="par-top">'+
        '<div class="par-num">'+(pos+1)+'</div>'+
        '<div class="par-info">'+
          '<div class="par-cliente">'+p.cliente+(p.zona?'<span class="p-zona">'+p.zona+'</span>':'')+
            (turnoP==="man"?'<span style="background:#1a4a7a;color:#fff;border-radius:3px;font-size:.6rem;font-weight:700;padding:1px 5px;margin-left:4px;">🌅 Mañana</span>'
            :turnoP==="tar"?'<span style="background:#c0392b;color:#fff;border-radius:3px;font-size:.6rem;font-weight:700;padding:1px 5px;margin-left:4px;">🌆 Tarde</span>':'')+
          '</div>'+
          '<div class="par-dir">📍 '+(p.dir||"—")+'</div>'+
          (p.tel?'<div class="par-tel">📱 '+p.tel+'</div>':'')+
        '</div>'+cob+
        // Cuadritos de turno (solo admin puede marcar)
        '<div style="display:flex;flex-direction:column;gap:4px;padding:6px 8px;flex-shrink:0;justify-content:center;">'+
          '<button class="btn-turno-par'+(turnoP==="man"?" man":"")+'" id="pman-'+p._k+'" style="font-size:.62rem;padding:3px 7px;">🌅 M</button>'+
          '<button class="btn-turno-par'+(turnoP==="tar"?" tar":"")+'" id="ptar-'+p._k+'" style="font-size:.62rem;padding:3px 7px;">🌆 T</button>'+
        '</div>'+
      '</div>'+
      '<div class="par-body">'+items+'</div>'+
      (p.obs?'<div class="par-obs">⚠ '+p.obs+'</div>':'')+
      '<div class="par-act">'+
        '<button class="btn-subir"'+(esFirst?' disabled':'')+'>↑ Subir</button>'+
        '<button class="btn-bajar"'+(esLast?' disabled':'')+'>↓ Bajar</button>'+
        '<button class="btn-editar">✏ Editar</button>'+
        '<button class="del btn-borrar">✕ Quitar</button>'+
      '</div>';
    // Eventos con data-key para evitar problemas de comillas
    div.querySelector(".btn-subir").addEventListener("click", () => moverP(p._k, -1));
    div.querySelector(".btn-bajar").addEventListener("click", () => moverP(p._k,  1));
    div.querySelector(".btn-editar").addEventListener("click", () => editarPedido(p._k));
    div.querySelector(".btn-borrar").addEventListener("click", () => borrarPedido(p._k));
    // Botones de turno — solo admin puede asignar
    div.querySelector("#pman-"+p._k).addEventListener("click", () => asignarTurnoParada(p._k, "man"));
    div.querySelector("#ptar-"+p._k).addEventListener("click", () => asignarTurnoParada(p._k, "tar"));
    cont.appendChild(div);
  });
}

window.asignarTurnoParada = async (pedKey, turno) => {
  const p = pedidos[pedKey]; if (!p) return;
  const cli = clientes.find(c => c.id === p.clienteId); if (!cli) return;
  const zona = (cli.zona||"").trim().toLowerCase(); if (!zona) return;

  if (!turnos[zona]) turnos[zona] = {};
  // Toggle: si ya tiene ese turno, quitar
  if (turnos[zona][p.dia] === turno) {
    delete turnos[zona][p.dia];
  } else {
    turnos[zona][p.dia] = turno;
  }
  await saveTurnos();
  renderRuta(); // re-renderizar para mostrar el cambio
};

window.moverP = (k, dir) => {
  const idx = ordenManual.indexOf(k);
  if (idx===-1) return;
  const ni = idx+dir;
  if (ni<0||ni>=ordenManual.length) return;
  [ordenManual[idx],ordenManual[ni]] = [ordenManual[ni],ordenManual[idx]];
  renderRuta();
};

window.editarPedido = async (k) => {
  const p = pedidos[k]; if(!p) return;
  const cl = clientes.find(c=>c.id===p.clienteId);
  if (cl) window.selCli(cl.id);
  itemsPedido = p.items.map(it=>{
    const cat=catalogo.find(x=>x.id===it.id)||{};
    return {prodId:it.id,nombre:it.n,qty:it.q,tipo:cat.tipo||"prod",reglas:cat.reglas||[],precioBase:cat.precio||it.precioUnit};
  });
  document.getElementById("pedObs").value = p.obs||"";
  editKey = k;
  adminTab("carga");
  renderItemsPedido();
  window.scrollTo(0,0);
};

window.borrarPedido = async (k) => {
  if (!confirm("¿Eliminar este pedido?")) return;
  await removePedido(k);
};

window.limpiarDia = async () => {
  if (!diaActual) { alert("Seleccioná un día."); return; }
  if (!confirm(`¿Limpiar todos los pedidos de ${DIAS_L[diaActual]}?`)) return;
  const keys = Object.entries(pedidos).filter(([,p])=>p.dia===diaActual).map(([k])=>k);
  for (const k of keys) await removePedido(k);
  ordenManual = [];
};

// ── RENDER STOCK ADMIN ────────────────────────
function renderStock() {
  const lbl = document.getElementById("stockDiaLbl");
  if (lbl) lbl.textContent = DIAS_L[diaActual]||"";

  let pedDia = Object.entries(pedidos)
    .filter(([,p])=>!diaActual||p.dia===diaActual)
    .map(([k,p])=>({...p,_k:k}));

  // Aplicar filtro de turno
  pedDia = filtrarPorTurno(pedDia, turnoFiltroStock);

  // ── Stock total a cargar ──
  const tot = {};
  pedDia.forEach(p=>p.items.forEach(it=>tot[it.n]=(tot[it.n]||0)+it.q));
  const grid = document.getElementById("stockGrid");
  if (!grid) return;
  grid.innerHTML = "";
  const entries = Object.entries(tot);
  if (!entries.length) { grid.innerHTML='<div class="empty" style="padding:18px;">Sin pedidos.</div>'; }
  else entries.forEach(([n,q])=>{
    const d=document.createElement("div"); d.className="si";
    d.innerHTML=`<span class="si-n">${n}</span><span class="si-q">${q}</span>`;
    grid.appendChild(d);
  });
  const t = document.getElementById("stockTotal");
  if (t) t.textContent = "$ "+pedDia.reduce((a,p)=>a+p.total,0).toLocaleString("es-AR");

  // ── Stock sobrante (lo que le queda al repartidor) ──
  const totEntregado = {};
  pedDia.filter(p=>(repEstado[p._k]||{}).entregado).forEach(p=>{
    const est = repEstado[p._k]||{};
    const items = est.itemsMod||p.items;
    items.forEach(it=>totEntregado[it.n]=(totEntregado[it.n]||0)+it.q);
  });
  const sobrante = {};
  Object.entries(tot).forEach(([n,q])=>{
    const resta = q - (totEntregado[n]||0);
    if (resta > 0) sobrante[n] = resta;
  });

  renderCobrosAdmin();

  const sGrid  = document.getElementById("admSobranteGrid");
  const sVacio = document.getElementById("admSobranteVacio");
  if (sGrid) {
    sGrid.innerHTML = "";
    const haySob = Object.keys(sobrante).length > 0;
    if (sVacio) sVacio.style.display = haySob ? "none" : "block";
    Object.entries(sobrante).forEach(([n,q])=>{
      const d=document.createElement("div"); d.className="si";
      d.style.background="#eaf4ea";
      d.innerHTML=`<span class="si-n">${n}</span><span class="si-q" style="color:#1a5c1a;">${q}</span>`;
      sGrid.appendChild(d);
    });
  }

  // ── Prospección admin — extra que lleva el repartidor ──
  const diaProspAdmin = diaActual || Object.keys(prosp)[0] || "";
  const pDataAdmin = prosp[diaProspAdmin] || {};
  const pItemsAdmin = Object.entries(pDataAdmin).filter(([,v])=>v&&v.qty>0);
  const admPB = document.getElementById("admProspBox");
  const admPG = document.getElementById("admProspGrid");
  if (admPB && admPG) {
    if (pItemsAdmin.length) {
      admPB.style.display = "block";
      admPG.innerHTML = "";
      pItemsAdmin.forEach(([,v])=>{
        const d=document.createElement("div"); d.className="si";
        d.innerHTML=`<span class="si-n">${v.nombre}</span><span class="si-q" style="color:#7b2fa8;">${v.qty}</span>`;
        admPG.appendChild(d);
      });
    } else {
      admPB.style.display = "none";
    }
  }
}

window.buscarProsp = (v) => {
  const ac=document.getElementById("prospAc");
  if(!v.trim()){ac.style.display="none";return;}
  const q=v.toLowerCase();
  const found=catalogo.filter(p=>p.activo&&p.nombre.toLowerCase().includes(q));
  if(!found.length){ac.style.display="none";return;}
  ac.innerHTML=found.map(p=>`<div class="ac-item" onclick="addItemProsp(${p.id})"><span>${p.nombre}</span><span style="color:var(--muted);font-size:.74rem;">$${p.precio.toLocaleString("es-AR")}</span></div>`).join("");
  ac.style.display="block";
};
window.addItemProsp=(prodId)=>{
  const ex=itemsProsp.find(i=>i.prodId===prodId);
  if(ex)ex.qty++;
  else{const p=catalogo.find(x=>x.id===prodId);if(!p)return;itemsProsp.push({prodId,nombre:p.nombre,qty:1});}
  document.getElementById("prospSearch").value="";
  document.getElementById("prospAc").style.display="none";
  renderProspItems();
};
function renderProspItems(){
  const cont=document.getElementById("prospItems");
  if(!itemsProsp.length){cont.innerHTML='<div class="empty">Buscá productos.</div>';document.getElementById("prospTotal").textContent="0 uds";return;}
  cont.innerHTML="";let total=0;
  itemsProsp.forEach((item,idx)=>{
    total+=item.qty;
    const row=document.createElement("div");row.className="prosp-item";
    row.innerHTML=`<div class="pp-n">${item.nombre}</div><div class="pp-qw"><button onclick="chgProsp(${idx},-1)">−</button><input class="pp-q" type="number" min="1" value="${item.qty}" oninput="setProsp(${idx},this.value)" onfocus="this.select()"/><button onclick="chgProsp(${idx},1)">+</button></div><button class="pp-del" onclick="quitarProsp(${idx})">✕</button>`;
    cont.appendChild(row);
  });
  document.getElementById("prospTotal").textContent=total+" uds";
}
window.chgProsp=(i,d)=>{itemsProsp[i].qty=Math.max(1,itemsProsp[i].qty+d);renderProspItems();};
window.setProsp=(i,v)=>{itemsProsp[i].qty=Math.max(1,parseInt(v)||1);renderProspItems();};
window.quitarProsp=(i)=>{itemsProsp.splice(i,1);renderProspItems();};
window.guardarProsp=async()=>{
  if(!itemsProsp.length){alert("No hay productos.");return;}
  const key=diaActual||"sin_dia";
  if(!prosp[key]) prosp[key]={};
  prosp[key]={};
  // Usar nombre normalizado como key para consistencia con el repartidor
  itemsProsp.forEach(i=>{
    const k=i.nombre.toLowerCase().replace(/[^a-z0-9]/g,"_");
    prosp[key][k]={nombre:i.nombre,qty:i.qty,prodId:i.prodId};
  });
  await set(ref(db,FB.prosp),prosp);
  const grid=document.getElementById("prospResGrid");if(grid){grid.innerHTML="";
  itemsProsp.forEach(i=>{const d=document.createElement("div");d.className="si";d.innerHTML=`<span class="si-n">${i.nombre}</span><span class="si-q">${i.qty}</span>`;grid.appendChild(d);});}
  const box=document.getElementById("prospResBox");if(box)box.style.display="block";
  alert("✓ Prospección guardada.");
};

function renderSeguimiento() {
  if (rol!=="admin") return;
  const segView = document.getElementById("v-seguimiento");
  if (!segView?.classList.contains("on")) return;

  const MODOS={efe:"💵 Efectivo",tra:"📲 Transferencia",mix:"🔀 Mixto"};
  const lista = Object.entries(pedidos)
    .filter(([,p])=>!diaActual||p.dia===diaActual)
    .map(([k,p])=>({...p,_k:k}))
    .sort((a,b)=>ordenPedido(a)-ordenPedido(b));

  const pend = lista.filter(p=>!(repEstado[p._k]||{}).entregado);
  const ents  = lista.filter(p=> (repEstado[p._k]||{}).entregado);

  document.getElementById("segTitulo").textContent = "Seguimiento — "+(DIAS_L[diaActual]||"");
  document.getElementById("segProg").textContent = ents.length+"/"+lista.length;
  document.getElementById("segProgBar").style.width = lista.length?Math.round(ents.length/lista.length*100)+"%":"0%";
  document.getElementById("scnt-pend").textContent = pend.length;
  document.getElementById("scnt-ent").textContent  = ents.length;

  const svP = document.getElementById("sgv-pend");
  if (!pend.length) { svP.innerHTML='<div class="empty">✅ Todos entregados.</div>'; }
  else {
    svP.innerHTML="";
    pend.forEach((p,pos)=>{
      const div=document.createElement("div");div.className="seg-pend parada";
      const items=p.items.map(it=>`<span class="ptag"><span class="pq">${it.q}×</span>${it.n}</span>`).join("");
      div.innerHTML=`<div class="par-top"><div class="par-num" style="background:#bbb;">${pos+1}</div><div class="par-info"><div class="par-cliente">${p.cliente}</div><div class="par-dir">📍 ${p.dir||"—"}</div></div><div class="par-cob nc"><span class="lbl">Cobrar</span><span class="val">$${p.total.toLocaleString("es-AR")}</span></div></div><div class="par-body">${items}</div>`;
      svP.appendChild(div);
    });
  }

  const svE = document.getElementById("sgv-ent");
  if (!ents.length) { svE.innerHTML='<div class="empty">Sin entregas todavía.</div>'; }
  else {
    svE.innerHTML="";
    ents.forEach((p,pos)=>{
      const est=repEstado[p._k]||{};
      const esCerrado=!!est.cerrado;
      const items=(est.itemsMod||p.items).map(it=>`<span class="ptag"><span class="pq">${it.q}×</span>${it.n}</span>`).join("");
      const totalAct=(est.itemsMod||p.items).reduce((a,it)=>a+(it.q*(it.precioUnit||0)),0);
      let cobTxt=MODOS[est.modo]||"—";
      if(est.modo==="efe"||est.modo==="mix")cobTxt+=est.efectivo?` $${Number(est.efectivo).toLocaleString("es-AR")}`:"\xa0";
      if(est.modo==="tra"||est.modo==="mix")cobTxt+=est.transferencia?` Transf $${Number(est.transferencia).toLocaleString("es-AR")}`:"\xa0";
      const esFac=!!facturados[p._k];
      const div=document.createElement("div");
      div.className="seg-ent"+(esCerrado?" cerrado":"");
      div.innerHTML=`<div class="ec-top"><div class="ec-num">${esCerrado?'✕':'✓'}</div><div class="ec-info"><div class="ec-cliente">${p.cliente}${esCerrado?'<span class="cerrado-badge">CERRADO</span>':''}</div><div class="ec-dir">📍 ${p.dir||"—"}</div></div><div class="ec-cob"><span class="lbl">Cobrado</span><span class="val">$${totalAct.toLocaleString("es-AR")}</span></div></div><div class="ec-items">${items}</div><div class="ec-cobro">${cobTxt}</div>${est.obs?`<div class="ec-acl">⚠ ${est.obs}</div>`:""}<div class="fac-toggle" onclick=\"toggleFac('${p._k}')\"><div class="fac-box${esFac?" ok":""}"></div><span class="fac-lbl${esFac?" ok":""}">${esFac?"✓ Factura emitida":"Marcar como facturado"}</span></div>`;
      svE.appendChild(div);
    });
  }
}

    c.appendChild(div);
  });
}
window.togCE=(id)=>document.getElementById("ce-"+id).classList.toggle("on");
window.togAct=async(id)=>{const p=catalogo.find(x=>x.id===id);if(p){p.activo=!p.activo;await saveCatalogo();renderCatalogo();}};
window.delProd=async(id)=>{if(!confirm("¿Eliminar producto?"))return;catalogo=catalogo.filter(x=>x.id!==id);await saveCatalogo();renderCatalogo();};
window.saveEP=async(id)=>{
  const p=catalogo.find(x=>x.id===id);if(!p)return;
  p.nombre=document.getElementById("cen-"+id).value.trim()||p.nombre;
  p.precio=parseInt(document.getElementById("cep-"+id).value)||p.precio;

window.addReglaNueva=()=>{
  const c2=parseInt(document.getElementById("rCant").value);
  const pr=parseInt(document.getElementById("rPrec").value);
  if(!c2||!pr||c2<2){alert("Cantidad ≥2 y precio válido.");return;}
  reglasTemp.push({desde:c2,precioUnit:pr});reglasTemp.sort((a,b)=>a.desde-b.desde);
  document.getElementById("rCant").value="";document.getElementById("rPrec").value="";
  document.getElementById("reglasNuevas").innerHTML=reglasTemp.map((r,i)=>`<div class="regla-item">≥${r.desde}u → $${r.precioUnit.toLocaleString("es-AR")}/u<button class="regla-del" onclick="reglasTemp.splice(${i},1);document.getElementById('reglasNuevas').innerHTML=''">✕</button></div>`).join("");

window.guardarProducto=async()=>{
  const nombre=document.getElementById("npNom").value.trim();
  const precio=parseInt(document.getElementById("npPrecio").value);
  const tipo=document.getElementById("npTipo").value;
  const activo=document.getElementById("npActivo").checked;
  if(!nombre||!precio||precio<0){alert("Nombre y precio válido.");return;}
  const maxId=catalogo.reduce((m,p)=>Math.max(m,p.id||0),0);
  catalogo.push({id:maxId+1,nombre,precio,tipo,activo,reglas:[...reglasTemp]});
  reglasTemp=[];
  await saveCatalogo();renderCatalogo();
  document.getElementById("npNom").value="";document.getElementById("npPrecio").value="";
  document.getElementById("npTipo").value="prod";document.getElementById("promoConfig").style.display="none";
  document.getElementById("reglasNuevas").innerHTML="";
};

window.renderClientes = function renderClientes() {
  const list = document.getElementById("clientesList"); if (!list) return;
  const ftxt = (document.getElementById("filtroCli")?.value||"").toLowerCase();
  const fdia = document.getElementById("filtroDia")?.value||"";

  let sorted = [...clientes].sort((a,b) => ordenCliente(a,fdia) - ordenCliente(b,fdia));
  if (ftxt) sorted = sorted.filter(c =>
    c.nombre.toLowerCase().includes(ftxt) ||
    (c.zona||"").toLowerCase().includes(ftxt) ||
    (c.tel||"").includes(ftxt)
  );
  if (fdia) sorted = sorted.filter(c => {
    const dias = Array.isArray(c.dias) ? c.dias : (c.dias ? [c.dias] : []);
    return dias.includes(fdia);
  });

  if (!sorted.length) { list.innerHTML='<div class="empty">Sin clientes.</div>'; return; }
  list.innerHTML = "";

  const conPedido = new Set(
    Object.values(pedidos).filter(p => !diaActual || p.dia === diaActual).map(p => p.clienteId)
  );

  sorted.forEach(c => {
    const cDias   = Array.isArray(c.dias) ? c.dias : [];
    const diasStr = cDias.map(d => DIAS_S[d]||d).join("/");
    const oLMV    = c.ordenLMV || c.orden || "—";
    const oMJ     = c.ordenMJ  || "—";
    const oSAB    = c.ordenSAB || "—";
    const tienePedido = conPedido.has(c.id);
    const telLimpio   = (c.tel||"").replace(/[^0-9]/g,"");
    const telWA       = telLimpio ? "549"+telLimpio : "";

    const div = document.createElement("div");
    div.className = "cc" + (tienePedido ? " con-pedido" : "");

    const pedBadge = tienePedido
      ? '<span style="background:var(--green);color:#fff;border-radius:3px;font-size:.62rem;font-weight:700;padding:1px 5px;margin-left:4px;">✓ PEDIDO</span>'
      : "";

    div.innerHTML =
      '<div class="cc-top">' +
        '<div class="cc-num">' + oLMV + '</div>' +
        '<div class="cc-info">' +
          '<div class="cc-nombre">' + c.nombre + pedBadge + '</div>' +
          '<div class="cc-sub">' +
            (c.zona ? '<span class="cc-zona">' + c.zona + '</span>' : '') +
            (diasStr ? '<span class="cc-dias">' + diasStr + '</span>' : '') +
            '<span>📍 ' + (c.dir||"—") + '</span>' +
            (c.tel ? '<span>📱 ' + c.tel + '</span>' : '') +

function renderCobrosAdmin() {
  // Pedidos del día entregados, filtrados por turno
  const pedDia = Object.entries(pedidos)
    .filter(([,p])=>!diaActual||p.dia===diaActual)
    .map(([k,p])=>({...p,_k:k}))
    .filter(p=>(repEstado[p._k]||{}).entregado);

  const pedFiltrados = filtrarPorTurno(pedDia, turnoCobros);

  let totalEfe=0, totalTransf=0;

  // Sumar de pedidos del recorrido — EXCLUIR cerrados (no se cobró)
  pedFiltrados.forEach(p=>{
    const est=repEstado[p._k]||{};
    if(est.cerrado) return; // cerrado = no vendido, no suma al cobro
    const items=est.itemsMod||p.items;
    const total=items.reduce((a,it)=>a+(it.q*(it.precioUnit||0)),0);
    const modo=est.modo||"";
    if(modo==="efe") totalEfe+=total;
    else if(modo==="tra") totalTransf+=total;
    else if(modo==="mix"){
      totalEfe+= Number(est.efectivo||0);
      totalTransf+=Number(est.transferencia||0);
    }
  });

  // Sumar ventas de prospección del día (desde Firebase ventas)
  // Se usa ventas en Firebase — escuchar via escucharVentas si existe
  // Por ahora usar ventasLocal para no romper nada
  const diaVentaFiltro = diaActual||"";
  const ventasDia = Object.values(ventas||{}).filter(v=>!diaVentaFiltro||v.dia===diaVentaFiltro);
  ventasDia.forEach(v=>{
    // Verificar turno de la venta (por zona del primer cliente — simplificado)
    const modo=v.modo||"";
    if(modo==="efe") totalEfe+=Number(v.efectivo||v.total||0);
    else if(modo==="tra") totalTransf+=Number(v.transferencia||v.total||0);
    else if(modo==="mix"){
      totalEfe+=Number(v.efectivo||0);
      totalTransf+=Number(v.transferencia||0);
    }
  });

  const efeEl   = document.getElementById("admCobrosEfe");
  const transfEl= document.getElementById("admCobrosTransf");
  const totEl   = document.getElementById("admCobrosTot");
  if(efeEl)    efeEl.textContent    = "$ "+totalEfe.toLocaleString("es-AR");
  if(transfEl) transfEl.textContent = "$ "+totalTransf.toLocaleString("es-AR");
  if(totEl)    totEl.textContent    = "$ "+(totalEfe+totalTransf).toLocaleString("es-AR");
}

// Función para filtrar pedidos por turno
function filtrarPorTurno(pedLista, filtro) {
  if (filtro === "completo") return pedLista;
  return pedLista.filter(p => {
    const c = clientes.find(x => x.id === p.clienteId);
    if (!c) return filtro === "completo";
    const zona = (c.zona||"").trim().toLowerCase();
    const turnoZona = turnos[zona]?.[p.dia] || "";
    // Sin turno asignado → aparece en Completo siempre
    if (!turnoZona) return false;
    return turnoZona === filtro;
  });
}

window.guardarTurnoZona = async () => {
  if (!turnoZonaActual) return;
  // Limpiar días sin turno
  const config = {};

  if (Object.keys(config).length === 0) {
    delete turnos[turnoZonaActual];
  } else {
    turnos[turnoZonaActual] = config;
  }
  await saveTurnos();
  renderTurnoList();

  turnoZonaActual = "";
  turnoConfigActual = {};
  document.getElementById("turnoZonaSel").style.display = "none";
  document.getElementById("turnoGrid").style.display = "none";

function insercionCascada(campo, orden) {
  clientes.forEach(c=>{if((c[campo]||0)>=orden)c[campo]=(c[campo]||0)+1;});
}

window.agregarCliente=async()=>{
  const nombre=document.getElementById("ncNom").value.trim();
  const tel=document.getElementById("ncTel").value.trim();
  const dir=document.getElementById("ncDir").value.trim();
  const zona=document.getElementById("ncZona").value.trim();
  const dias=[...document.querySelectorAll(".nc-dia:checked")].map(x=>x.value);
  const rawLMV=document.getElementById("ncOLMV").value.trim();
  const rawMJ=document.getElementById("ncOMJ").value.trim();
  const rawSAB=document.getElementById("ncOSAB").value.trim();
  if(!nombre){alert("Ingresá el nombre.");return;}
  let oLMV=null,oMJ=null,oSAB=null;
  if(rawLMV&&!isNaN(parseInt(rawLMV))){oLMV=Math.max(1,parseInt(rawLMV));insercionCascada("ordenLMV",oLMV);}
  else if(dias.some(d=>["lunes","miercoles","viernes"].includes(d))){oLMV=clientes.reduce((m,c)=>Math.max(m,c.ordenLMV||0),0)+1;}
  if(rawMJ&&!isNaN(parseInt(rawMJ))){oMJ=Math.max(1,parseInt(rawMJ));insercionCascada("ordenMJ",oMJ);}
  else if(dias.some(d=>["martes","jueves"].includes(d))){oMJ=clientes.reduce((m,c)=>Math.max(m,c.ordenMJ||0),0)+1;}
  if(rawSAB&&!isNaN(parseInt(rawSAB))){oSAB=Math.max(1,parseInt(rawSAB));insercionCascada("ordenSAB",oSAB);}
  else if(dias.includes("sabado")){oSAB=clientes.reduce((m,c)=>Math.max(m,c.ordenSAB||0),0)+1;}
  const maxId=clientes.reduce((m,c)=>Math.max(m,c.id||0),0);
  clientes.push({id:maxId+1,nombre,tel,dir,zona,dias,orden:oLMV||oMJ||oSAB||999,ordenLMV:oLMV,ordenMJ:oMJ,ordenSAB:oSAB});
  await saveClientes();
  ["ncNom","ncTel","ncDir","ncZona","ncOLMV","ncOMJ","ncOSAB"].forEach(id=>document.getElementById(id).value="");
  document.querySelectorAll(".nc-dia:checked").forEach(x=>x.checked=false);
  renderClientes();
};

window.saveCCE=async(id)=>{
  const c=clientes.find(x=>x.id===id);if(!c)return;
  const noLMV=parseInt(document.getElementById("cco-lmv-"+id)?.value)||null;
  const noMJ =parseInt(document.getElementById("cco-mj-"+id)?.value)||null;
  const noSAB=parseInt(document.getElementById("cco-sab-"+id)?.value)||null;

  if(noLMV&&noLMV!==c.ordenLMV){c.ordenLMV=9999;clientes.forEach(x=>{if(x.id!==id&&(x.ordenLMV||0)>=noLMV)x.ordenLMV=(x.ordenLMV||0)+1;});c.ordenLMV=noLMV;}
  if(noMJ &&noMJ !==c.ordenMJ ){c.ordenMJ =9999;clientes.forEach(x=>{if(x.id!==id&&(x.ordenMJ ||0)>=noMJ )x.ordenMJ =(x.ordenMJ ||0)+1;});c.ordenMJ =noMJ;}
  if(noSAB&&noSAB!==c.ordenSAB){c.ordenSAB=9999;clientes.forEach(x=>{if(x.id!==id&&(x.ordenSAB||0)>=noSAB)x.ordenSAB=(x.ordenSAB||0)+1;});c.ordenSAB=noSAB;}

  c.nombre=document.getElementById("ccn-"+id)?.value.trim()||c.nombre;
  c.tel   =document.getElementById("cct-"+id)?.value.trim()||"";

  c.dias  =[...document.querySelectorAll(`[data-eid="${id}"]:checked`)].map(x=>x.value);

  const numEl = document.querySelector(`#cce-${id}`)?.closest(".cc")?.querySelector(".cc-num");
  const nomEl = document.querySelector(`#cce-${id}`)?.closest(".cc")?.querySelector(".cc-nombre");

  if(nomEl) nomEl.childNodes[0].textContent = c.nombre;

  const btn = document.getElementById("ccsave-"+id);

function _pdf(ped){

  let y=30;const pH=297,lh=5;
  const chk=n=>{if(y+n>pH-12){doc.addPage();doc.setFillColor(26,22,18);doc.rect(0,0,W,12,"F");doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(8);doc.text("RECORRIDO AMADEO — "+diaStr+" — "+fecha,m,8);doc.setTextColor(26,22,18);y=20;}};
  ped.forEach((p,idx)=>{
    chk(10+(p.items.length*lh)+(p.obs?lh:0)+8);
    doc.setFillColor(240,235,224);doc.rect(m,y,W-m*2,9,"F");doc.setDrawColor(200,190,175);doc.rect(m,y,W-m*2,9,"S");
    doc.setFillColor(26,22,18);doc.rect(m,y,10,9,"F");doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(9);doc.text(String(idx+1),m+5,y+6,{align:"center"});
    doc.setTextColor(26,22,18);doc.text(p.cliente+(p.zona?" ["+p.zona+"]":""),m+13,y+6);
    if(p.total>0){doc.setFillColor(30,107,60);doc.rect(W-m-28,y+1,27,7,"F");doc.setTextColor(255,255,255);doc.setFontSize(8);doc.text("$"+p.total.toLocaleString("es-AR"),W-m-1,y+6,{align:"right"});}
    y+=10;
    doc.setTextColor(80,70,60);doc.setFont("helvetica","normal");doc.setFontSize(8);
    let inf="";if(p.dir)inf+=p.dir;if(p.tel)inf+=(inf?"   Tel: ":"Tel: ")+p.tel;if(inf){doc.text(inf,m+2,y);y+=lh;}
    p.items.forEach(it=>{chk(lh+2);doc.setFillColor(26,74,122);doc.circle(m+4,y-1.2,1.2,"F");doc.setFont("helvetica","bold");doc.text(String(it.q)+"×",m+7,y);doc.setFont("helvetica","normal");doc.text(it.n+(it.esPromo?" ★":""),m+16,y);doc.setTextColor(30,107,60);doc.setFont("helvetica","bold");doc.text("$"+it.subtotal.toLocaleString("es-AR"),W-m-1,y,{align:"right"});doc.setTextColor(26,22,18);y+=lh;});
    if(p.obs){chk(lh+2);doc.setFont("helvetica","italic");doc.setFontSize(7.5);doc.setTextColor(180,100,20);doc.text("⚠ "+p.obs,m+2,y);doc.setTextColor(26,22,18);y+=lh;}
    chk(10);doc.setDrawColor(180,170,155);doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.setTextColor(120,110,100);
    doc.rect(m+2,y+1,4,4);doc.text("Efectivo $______",m+8,y+4.5);doc.rect(m+56,y+1,4,4);doc.text("Transf. $______",m+62,y+4.5);doc.rect(m+110,y+1,4,4);doc.text("Mixto",m+116,y+4.5);
    y+=9;doc.setDrawColor(210,200,185);doc.setLineWidth(0.3);doc.line(m,y,W-m,y);y+=5;
  });
  chk(50);y+=3;doc.setFillColor(26,22,18);doc.rect(m,y,W-m*2,9,"F");doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(9);doc.text("STOCK A CARGAR",m+3,y+6);doc.text("TOTAL: $"+ped.reduce((a,p)=>a+p.total,0).toLocaleString("es-AR"),W-m-2,y+6,{align:"right"});y+=12;
  const tot={};ped.forEach(p=>p.items.forEach(it=>tot[it.n]=(tot[it.n]||0)+it.q));
  const cW=(W-m*2)/3;let col=0;doc.setTextColor(26,22,18);
  Object.entries(tot).forEach(([n,q])=>{chk(9);const xP=m+col*cW;doc.setFillColor(col%2===0?248:240,col%2===0?245:238,col%2===0?238:224);doc.rect(xP,y,cW-1,8,"F");doc.setDrawColor(200,190,175);doc.rect(xP,y,cW-1,8,"S");doc.setFont("helvetica","normal");doc.setFontSize(8);doc.text(n,xP+2,y+5.5);doc.setFont("helvetica","bold");doc.setFontSize(11);doc.text(String(q),xP+cW-4,y+6,{align:"right"});col++;if(col===3){col=0;y+=9;}});if(col>0)y+=9;
  doc.save(`recorrido_amadeo_${diaStr}_${fecha.replace(/\//g,"-")}.pdf`);
}

// ── RENDER RECORRIDO REP ──────────────────────
function renderRepRecorrido() {
  // Filtrar por día del repartidor y ordenar igual que el admin
  let lista=Object.entries(pedidos)
    .filter(([,p])=> !diaRep || p.dia === diaRep)
    .map(([k,p])=>({...p,_k:k}))
    .sort((a,b)=>{
      const ca=clientes.find(c=>c.id===a.clienteId);
      const cb=clientes.find(c=>c.id===b.clienteId);
      const oa=ca?ordenCliente(ca, a.dia):(a.orden||999);
      const ob=cb?ordenCliente(cb, b.dia):(b.orden||999);
      return oa-ob;
    });

  // Aplicar filtro de turno
  lista = filtrarPorTurno(lista, turnoFiltroRep);

  const pend=lista.filter(p=>!(repEstado[p._k]||{}).entregado);
  const ents=lista.filter(p=> (repEstado[p._k]||{}).entregado);
  const total=lista.length,nEnt=ents.length;
  const pb=document.getElementById("repProgBadge");if(pb)pb.textContent=nEnt+"/"+total+" entregados";
  const bar=document.getElementById("repProgBar");if(bar)bar.style.width=total?Math.round(nEnt/total*100)+"%":"0%";
  const cp=document.getElementById("rcnt-pend");if(cp)cp.textContent=pend.length;
  const ce=document.getElementById("rcnt-ent");if(ce)ce.textContent=nEnt;
  const br=document.getElementById("btnReporte");if(br)br.style.display=nEnt===total&&total>0?"flex":"none";
  renderRepPendientes(pend);
  renderRepEntregados(ents);
}

function buildModItems(k, items) {
  // Crear contenedor y adjuntar eventos con addEventListener — sin onclick inline
  const frag = document.createDocumentFragment();
  items.forEach((it, idx) => {
    const row = document.createElement("div");
    row.className = "mod-item";
    row.innerHTML =

// Cache local de modificaciones — separado de repEstado para que el listener
// de Firebase no lo borre mientras el repartidor está editando
const _modCache = {};

function getModItemsRep(k) {
  // Si ya hay una copia local en cache, usarla
  if (_modCache[k]) return _modCache[k];
  // Si hay itemsMod guardado en Firebase (repEstado), usarlo
  const est = getEstRep(k);
  if (est.itemsMod && est.itemsMod.length) {
    _modCache[k] = JSON.parse(JSON.stringify(est.itemsMod));
    return _modCache[k];
  }
  // Sino, copiar el pedido original
  if (pedidos[k]) {
    _modCache[k] = JSON.parse(JSON.stringify(pedidos[k].items));
    return _modCache[k];
  }
  return [];
}

window.modChgRep=(k,idx,d)=>{

  updateModTotalRep(k);
};
window.modSetRep=(k,idx,v)=>{

// Recalcula precioUnit según cantidad actual (respeta promos)
function recalcPrecioItem(item) {
  const cat = catalogo.find(x => x.id === item.id);
  if (!cat) return;
  // Precio base siempre disponible
  const precioBase = cat.precio;
  if (cat.tipo === "promo" && cat.reglas?.length) {
    // Buscar la regla que aplica para la cantidad actual
    const reglaAplica = [...cat.reglas]
      .filter(r => item.q >= r.desde)
      .sort((a,b) => b.desde - a.desde)[0];
    if (reglaAplica) {
      item.precioUnit = reglaAplica.precioUnit;
      item.esPromo = true;
    } else {
      // Cantidad menor al mínimo de promo → precio base
      item.precioUnit = precioBase;
      item.esPromo = false;
    }
  } else {
    item.precioUnit = precioBase;
    item.esPromo = false;
  }
}

function renderRepStock(){
  let lista=Object.entries(pedidos)
    .filter(([,p])=> !diaRep || p.dia === diaRep)

  // Aplicar filtro de turno
  lista = filtrarPorTurno(lista, turnoFiltroRepStock);

  // ── STOCK TOTAL A LLEVAR (siempre pedido original del admin) ──
  const totLlevar={};
  lista.forEach(p=>{
    p.items.forEach(it=>totLlevar[it.n]=(totLlevar[it.n]||0)+it.q);
  });
  const grid=document.getElementById("repStockGrid");if(!grid)return;
  grid.innerHTML="";let ok=false;
  Object.entries(totLlevar).forEach(([n,q])=>{
    ok=true;
    const d=document.createElement("div");d.className="si";
    d.innerHTML=`<span class="si-n">${n}</span><span class="si-q">${q}</span>`;
    grid.appendChild(d);
  });
  if(!ok)grid.innerHTML='<div class="empty">Sin pedidos.</div>';
  // Total solo para admin — no se muestra al repartidor

  // ── PROSPECCIÓN UNIFICADA ──
  // Usar el día más relevante: diaRep si está seleccionado, sino el que tenga más datos
  const _diasProsp = Object.keys(prosp);
  const diaProsp = diaRep || (_diasProsp.length===1?_diasProsp[0]:"") || "";
  const pData = prosp[diaProsp] || {};
  const pItems = Object.values(pData).filter(v=>v&&v.qty>0);

  // Descontar lo vendido de prospección
  const ventasDelDia = ventasLocal.filter(v => !v.dia || v.dia === diaProsp);
  const vendido = {};
  ventasDelDia.forEach(v => v.items.forEach(it => vendido[it.nombre]=(vendido[it.nombre]||0)+it.qty));

  const pb=document.getElementById("repProspBox"),pg=document.getElementById("repProspGrid");
  if(pb&&pg){
    if(pItems.length){
      pb.style.display="block";pg.innerHTML="";
      pItems.forEach(v=>{
        const vendidoQty = vendido[v.nombre]||0;
        const resta = Math.max(0, v.qty - vendidoQty);
        if(resta<=0) return; // ya vendido todo
        const d=document.createElement("div");d.className="si";
        d.innerHTML='<span class="si-n">'+v.nombre+'</span><span class="si-q" style="color:var(--purple);">'+resta+'</span>';
        pg.appendChild(d);
      });
      if(!pg.children.length){
        pb.style.display="none";
      }
    }else pb.style.display="none";
  }
}

// ── HELPER: modificar prospección por nombre ──
async function ajustarProsp(dia, nombre, delta) {
  // delta positivo = sumar, negativo = restar
  if (!dia || !nombre || delta===0) return;
  if (!prosp[dia]) prosp[dia] = {};
  // Buscar la entrada por nombre (case-insensitive)
  let entry = Object.entries(prosp[dia]).find(([,v])=>
    v.nombre && v.nombre.toLowerCase() === nombre.toLowerCase()
  );
  if (entry) {
    const [k, v] = entry;
    const nuevaQty = Math.max(0, (v.qty||0) + delta);
    if (nuevaQty === 0) {
      delete prosp[dia][k]; // eliminar si llega a 0
    } else {
      prosp[dia][k].qty = nuevaQty;
    }
  } else if (delta > 0) {
    // Solo crear entrada nueva si es SUMA (nunca dejar negativos)
    const k = nombre.toLowerCase().replace(/[^a-z0-9]/g,"_");
    prosp[dia][k] = { nombre, qty: delta };
  }
  // Si delta < 0 y no existe en prospección → ignorar (no hay stock para restar)
  await set(ref(db, FB.prosp), prosp);
}

    const items=v.items.map(it=>`<span class="ptag" style="background:#fff5c0;border-color:var(--gold);"><span class="pq">${it.qty}×</span>${it.nombre}</span>`).join("");
    let cobTxt=MODOS[v.modo]||"—";if(v.modo==="efe"||v.modo==="mix")cobTxt+=v.efectivo?` $${Number(v.efectivo).toLocaleString("es-AR")}`:"\xa0";if(v.modo==="tra"||v.modo==="mix")cobTxt+=v.transferencia?` Transf $${Number(v.transferencia).toLocaleString("es-AR")}`:"\xa0";
    div.innerHTML=`<div class="vc-top"><div class="vc-ico">💰</div><div class="vc-info"><div class="vc-nombre">${v.nombre}</div><div class="vc-hora">${v.hora}${v.dia?' · '+DIAS_L[v.dia]||v.dia:''}</div></div><div class="vc-total"><span class="lbl">Vendido</span><span class="val">$${v.total.toLocaleString("es-AR")}</span></div></div><div class="ec-items" style="border-bottom:1px solid #e0c040;padding:6px 10px;">${items}</div><div class="ec-cobro" style="color:var(--gold);padding:5px 10px;font-weight:600;">${cobTxt}</div><div class="ec-foot" style="border-top:1px solid #e0c040;"><button onclick="elimVenta(${idx})" style="color:var(--accent);">✕ Eliminar</button></div>`;
    list.appendChild(div);
  });
  const tot={};ventasLocal.forEach(v=>v.items.forEach(it=>tot[it.nombre]=(tot[it.nombre]||0)+it.qty));
  const pg=document.getElementById("ventasProdGrid");pg.innerHTML="";
  Object.entries(tot).forEach(([n,q])=>{const d=document.createElement("div");d.className="si";d.style.background="#fffbe8";d.innerHTML=`<span class="si-n">${n}</span><span class="si-q" style="color:var(--gold);">${q}</span>`;pg.appendChild(d);});
  document.getElementById("ventasTotalDia").textContent="$ "+ventasLocal.reduce((a,v)=>a+v.total,0).toLocaleString("es-AR");
  document.getElementById("ventasResBox").style.display="block";
}
window.elimVenta=(idx)=>{if(!confirm("¿Eliminar venta?"))return;ventasLocal.splice(idx,1);localStorage.setItem("am_ventas",JSON.stringify(ventasLocal));renderVentasList();};
window.enviarReporteVentas=()=>{
  if(!ventasLocal.length){alert("Sin ventas.");return;}
  const MODOS={efe:"💵 Efectivo",tra:"📲 Transferencia",mix:"🔀 Mixto"};
  const fecha=new Date().toLocaleDateString("es-AR");
  let txt=`💰 VENTAS — ${fecha}\n${"═".repeat(32)}\n\n`;
  let tEfe=0,tTra=0;
  ventasLocal.forEach((v,i)=>{txt+=`${i+1}. ${v.nombre} — ${v.hora}\n`;v.items.forEach(it=>txt+=`   • ${it.qty}x ${it.nombre}\n`);txt+=`   💰 $${v.total.toLocaleString("es-AR")} — ${MODOS[v.modo]||v.modo}\n`;if(v.modo==="efe"||v.modo==="mix")tEfe+=Number(v.efectivo||0);if(v.modo==="tra"||v.modo==="mix")tTra+=Number(v.transferencia||0);txt+="\n";});
  txt+=`${"─".repeat(32)}\n💵 Efectivo: $${tEfe.toLocaleString("es-AR")}\n📲 Transf: $${tTra.toLocaleString("es-AR")}\n💰 Total: $${ventasLocal.reduce((a,v)=>a+v.total,0).toLocaleString("es-AR")}\n`;
  window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank");
};

window.enviarReporte=()=>{
  const MODOS={efe:"💵 Efectivo",tra:"📲 Transferencia",mix:"🔀 Mixto"};
  const lista=Object.entries(pedidos).map(([k,p])=>({...p,_k:k}));
  const fecha=new Date().toLocaleDateString("es-AR");
  let txt=`📋 REPORTE REPARTIDOR — ${fecha}\n${"═".repeat(36)}\n\n`;
  let tEfe=0,tTra=0;
  lista.forEach((p,i)=>{
    const est=getEstRep(p._k);const items=est.itemsMod||p.items;const total=items.reduce((a,it)=>a+(it.q*(it.precioUnit||0)),0);
    txt+=`${i+1}. ${p.cliente}${p.zona?" ["+p.zona+"]":""}\n   📍 ${p.dir||"—"}\n`;
    items.forEach(it=>txt+=`   • ${it.q}x ${it.n}\n`);
    txt+=`   💰 $${total.toLocaleString("es-AR")}\n`;
    if(est.entregado){let cobro=MODOS[est.modo]||"—";const ve=Number(est.efectivo||0),vt=Number(est.transferencia||0);if(est.modo==="efe"||est.modo==="mix"){cobro+=` $${ve.toLocaleString("es-AR")}`;tEfe+=ve;}if(est.modo==="tra"||est.modo==="mix"){cobro+=` Transf $${vt.toLocaleString("es-AR")}`;tTra+=vt;}txt+=`   ✓ ${cobro}\n`;if(est.obs)txt+=`   ⚠ ${est.obs}\n`;}else txt+=`   ⏳ Sin entregar\n`;txt+="\n";
  });
  txt+=`${"─".repeat(36)}\n✅ ${Object.values(repEstado).filter(e=>e.entregado).length}/${lista.length} entregados\n💵 Efectivo: $${tEfe.toLocaleString("es-AR")}\n📲 Transf: $${tTra.toLocaleString("es-AR")}\n💰 Total: $${(tEfe+tTra).toLocaleString("es-AR")}\n`;
  window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank");
};
